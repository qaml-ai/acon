<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreadsheet Preview</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ea;
        --panel: rgba(255, 252, 244, 0.92);
        --line: rgba(65, 48, 28, 0.14);
        --line-strong: rgba(65, 48, 28, 0.24);
        --text: #2f2618;
        --muted: #73624b;
        --accent: #b9632d;
        --accent-soft: rgba(185, 99, 45, 0.12);
        --shadow: 0 20px 40px rgba(88, 66, 36, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 35%),
          linear-gradient(180deg, #fbf8f1 0%, var(--bg) 100%);
      }

      .shell {
        min-height: 100vh;
        padding: 18px;
      }

      .panel {
        min-height: calc(100vh - 36px);
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .hero {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 12px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 0 2px;
        color: var(--muted);
        font-size: 14px;
      }

      .status strong {
        color: var(--text);
      }

      .table-frame {
        min-height: 0;
        flex: 1;
        overflow: auto;
        border: 1px solid var(--line-strong);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        background:
          linear-gradient(180deg, rgba(255, 250, 240, 0.98), rgba(246, 238, 223, 0.98));
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        border-right: 1px solid rgba(65, 48, 28, 0.08);
        text-align: left;
        vertical-align: top;
        word-break: break-word;
        font-size: 13px;
      }

      th {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      tr:nth-child(even) td {
        background: rgba(246, 238, 223, 0.26);
      }

      .row-index {
        width: 72px;
        color: var(--muted);
        background: rgba(246, 238, 223, 0.52);
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 320px;
        padding: 24px;
        text-align: center;
        color: var(--muted);
      }

      .empty strong {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
      }

      .note {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="panel">
        <section class="hero">
          <div>
            <p class="eyebrow">Custom Preview Provider</p>
            <h1 id="title">Spreadsheet Preview</h1>
          </div>
          <div class="meta" id="meta"></div>
        </section>
        <div class="status" id="status">Loading spreadsheet preview...</div>
        <div class="table-frame">
          <div class="empty" id="empty" hidden>
            <div>
              <strong>Preview unavailable</strong>
              <span id="empty-message"></span>
            </div>
          </div>
          <table id="table" hidden>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <p class="note" id="note">
          Rendering is handled by the plugin webview, not the built-in Preview Panel renderer.
        </p>
      </div>
    </div>

    <script>
      const params = new URL(window.location.href).searchParams;
      const title =
        params.get("previewTitle") ||
        params.get("previewFilename") ||
        "Spreadsheet Preview";
      const previewSrc = params.get("previewSrc");
      const previewFilename = params.get("previewFilename") || title;
      const previewContentType = params.get("previewContentType") || "";

      const titleNode = document.getElementById("title");
      const metaNode = document.getElementById("meta");
      const statusNode = document.getElementById("status");
      const tableNode = document.getElementById("table");
      const tableHeadNode = document.getElementById("thead");
      const tableBodyNode = document.getElementById("tbody");
      const emptyNode = document.getElementById("empty");
      const emptyMessageNode = document.getElementById("empty-message");

      titleNode.textContent = title;

      function addMeta(label, value) {
        const pill = document.createElement("div");
        pill.className = "pill";
        pill.innerHTML = "<strong>" + label + "</strong> <span>" + value + "</span>";
        metaNode.appendChild(pill);
      }

      function showEmpty(message) {
        tableNode.hidden = true;
        emptyNode.hidden = false;
        emptyMessageNode.textContent = message;
        statusNode.innerHTML = "<strong>Preview unavailable.</strong> " + message;
      }

      function detectDelimiter() {
        if (previewContentType.includes("tab-separated") || previewFilename.toLowerCase().endsWith(".tsv")) {
          return "\t";
        }
        return ",";
      }

      function parseDelimited(text, delimiter) {
        const rows = [];
        let field = "";
        let row = [];
        let inQuotes = false;

        function pushField() {
          row.push(field);
          field = "";
        }

        function pushRow() {
          rows.push(row);
          row = [];
        }

        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const nextChar = text[index + 1];

          if (char === "\"") {
            if (inQuotes && nextChar === "\"") {
              field += "\"";
              index += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (!inQuotes && char === delimiter) {
            pushField();
            continue;
          }

          if (!inQuotes && char === "\n") {
            pushField();
            pushRow();
            continue;
          }

          if (!inQuotes && char === "\r") {
            continue;
          }

          field += char;
        }

        pushField();
        if (row.length > 1 || row[0] !== "" || rows.length === 0) {
          pushRow();
        }

        while (rows.length > 0 && rows[rows.length - 1].every((value) => value === "")) {
          rows.pop();
        }

        return rows;
      }

      function renderTable(rows) {
        if (rows.length === 0) {
          showEmpty("The file does not contain any rows.");
          return;
        }

        const header = rows[0];
        const body = rows.slice(1);
        const columnCount = header.length;

        addMeta("Rows", String(body.length));
        addMeta("Columns", String(columnCount));
        addMeta("Format", detectDelimiter() === "\t" ? "TSV" : "CSV");

        statusNode.innerHTML =
          "<strong>Custom renderer active.</strong> Parsed " +
          body.length +
          " data row(s) from " +
          previewFilename +
          ".";

        const headerRow = document.createElement("tr");
        const indexHeader = document.createElement("th");
        indexHeader.className = "row-index";
        indexHeader.textContent = "Row";
        headerRow.appendChild(indexHeader);

        header.forEach((value, index) => {
          const cell = document.createElement("th");
          cell.textContent = value || "Column " + (index + 1);
          headerRow.appendChild(cell);
        });
        tableHeadNode.appendChild(headerRow);

        body.forEach((values, rowIndex) => {
          const rowNode = document.createElement("tr");
          const indexCell = document.createElement("td");
          indexCell.className = "row-index";
          indexCell.textContent = String(rowIndex + 1);
          rowNode.appendChild(indexCell);

          for (let columnIndex = 0; columnIndex < columnCount; columnIndex += 1) {
            const cell = document.createElement("td");
            cell.textContent = values[columnIndex] || "";
            rowNode.appendChild(cell);
          }

          tableBodyNode.appendChild(rowNode);
        });

        tableNode.hidden = false;
        emptyNode.hidden = true;
      }

      async function main() {
        if (!previewSrc) {
          showEmpty("No preview source URL was provided to the plugin webview.");
          return;
        }

        try {
          const response = await fetch(previewSrc);
          if (!response.ok) {
            showEmpty("The preview source returned HTTP " + response.status + ".");
            return;
          }
          const text = await response.text();
          renderTable(parseDelimited(text, detectDelimiter()));
        } catch (error) {
          showEmpty(error instanceof Error ? error.message : String(error));
        }
      }

      void main();
    </script>
  </body>
</html>
